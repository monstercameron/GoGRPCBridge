name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  GOSEC_VERSION: v2.25.0
  GOVULNCHECK_VERSION: v1.1.4
  GOLANGCI_LINT_VERSION: v1.64.8
  GOIMPORTS_VERSION: v0.30.0
  CHANGELOG_PATH: docs/core/CHANGELOG.md

jobs:
  release:
    name: Build and Publish Release Assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    environment:
      name: gogrpcbridge-release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"

      - name: Resolve release version
        id: version
        run: echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Validate changelog entry exists for tag
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          if ! grep -q "^## \[$VERSION\]" "${CHANGELOG_PATH}"; then
            echo "Missing changelog section for $VERSION in ${CHANGELOG_PATH}"
            exit 1
          fi

      - name: Extract changelog notes for tag
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          awk '
            $0 ~ "^## \\[" version "\\]" { capture=1; next }
            $0 ~ "^## \\[" && capture { capture=0 }
            capture { print }
          ' version="$VERSION" "${CHANGELOG_PATH}" > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No release notes extracted for $VERSION"
            exit 1
          fi

      - name: Install quality toolchain
        run: |
          go install golang.org/x/tools/cmd/goimports@${GOIMPORTS_VERSION}
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@${GOLANGCI_LINT_VERSION}
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run release quality gate
        run: |
          set -euo pipefail
          for attempt in 1 2; do
            if RUNNER_STRICT_RACE=1 go run ./tools/runner.go quality; then
              exit 0
            fi
            if [ "$attempt" -eq 2 ]; then
              echo "Release quality gate failed after retry."
              exit 1
            fi
            echo "Release quality gate failed on attempt $attempt. Retrying once..."
            sleep 10
          done

      - name: Run canonical publish identity check
        run: go run ./tools/runner.go canonical-publish-check
        env:
          RUNNER_CANONICAL_GOPROXY: direct

      - name: Verify pkg.go.dev discoverability
        run: |
          MODULE_PATH="github.com/monstercameron/GoGRPCBridge"
          MODULE_URL="https://pkg.go.dev/${MODULE_PATH}"
          PACKAGE_URL="https://pkg.go.dev/${MODULE_PATH}/pkg/grpctunnel"

          check_url() {
            local url="$1"
            for attempt in 1 2 3 4 5 6; do
              status=$(curl -sS -o /dev/null -w "%{http_code}" "$url" || echo "000")
              if [ "$status" -ge 200 ] && [ "$status" -lt 400 ]; then
                return 0
              fi
              echo "pkg.go.dev check retry ${attempt}/6 for ${url}, status=${status}"
              sleep 10
            done
            echo "pkg.go.dev discoverability check failed for ${url}"
            return 1
          }

          check_url "$MODULE_URL"
          check_url "$PACKAGE_URL"

      - name: Run API governance guard
        run: go run ./tools/api_compat_guard check

      - name: Run release benchmark trend gate
        run: go run ./tools/runner.go quality-trend

      - name: Run release security gates
        run: |
          go run github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION} -severity high -confidence high -exclude G103 ./...
          go run github.com/securego/gosec/v2/cmd/gosec@${GOSEC_VERSION} -severity high -confidence high -include G103 ./pkg/... ./examples/... ./e2e/... ./tools/...
          go run golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION} ./...

      - name: Upload release gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-artifacts-${{ steps.version.outputs.value }}
          path: |
            ./bin/quality/summary.json
            ./bin/quality/trend.json
          if-no-files-found: ignore

      - name: Compile verification gate
        run: go test ./... -run '^$'

      - name: Build release artifacts
        run: |
          VERSION="${{ steps.version.outputs.value }}"
          mkdir -p dist

          go build -trimpath -ldflags="-s -w" \
            -o "dist/GoGRPCBridge-bridge-${VERSION}-linux-amd64" ./examples/direct-bridge

          go build -trimpath -ldflags="-s -w" \
            -o "dist/GoGRPCBridge-grpc-server-${VERSION}-linux-amd64" ./examples/grpc-server

          (
            cd examples/wasm-client
            GOOS=js GOARCH=wasm go build -trimpath \
              -o "../../dist/GoGRPCBridge-wasm-client-${VERSION}.wasm" .
          )

          tar -czf "dist/GoGRPCBridge-examples-${VERSION}-linux-amd64.tar.gz" \
            -C dist "GoGRPCBridge-bridge-${VERSION}-linux-amd64" "GoGRPCBridge-grpc-server-${VERSION}-linux-amd64"

          (cd dist && sha256sum * > SHA256SUMS.txt)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          name: Release ${{ steps.version.outputs.value }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/*
          draft: false
          prerelease: false
